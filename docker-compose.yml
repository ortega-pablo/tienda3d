services:
  db:
    image: postgres:16-alpine
    container_name: tienda3d_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tienda3d_net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: tienda3d_api
    restart: unless-stopped
    environment:
      NODE_ENV: ${API_NODE_ENV:-production}
      PORT: ${API_PORT:-3001}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${API_JWT_SECRET}
      JWT_EXPIRES_IN: ${API_JWT_EXPIRES_IN}
      REFRESH_SECRET: ${API_REFRESH_SECRET}
      REFRESH_EXPIRES_IN: ${API_REFRESH_EXPIRES_IN}
      CORS_ORIGIN: ${API_CORS_ORIGIN}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tienda3d_net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: tienda3d_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${WEB_PORT:-3000}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:3001}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    networks:
      - tienda3d_net

networks:
  tienda3d_net:
    driver: bridge

volumes:
  db_data:
