# Development overrides — auto-merged by `docker compose up`
services:
  api:
    build:
      dockerfile: apps/api/Dockerfile.dev
    environment:
      NODE_ENV: development
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/packages/shared/node_modules
    # Antes de arrancar Nest en watch mode, regenera el cliente Prisma
    # (refleja cambios del schema montado por volumen) y aplica migraciones
    # pendientes. `migrate deploy` es idempotente: si todo está al día, no
    # hace nada.
    command: sh -c "cd apps/api && pnpm prisma:generate && pnpm prisma migrate deploy && pnpm dev"

  web:
    build:
      dockerfile: apps/web/Dockerfile.dev
    environment:
      NODE_ENV: development
      API_INTERNAL_URL: http://api:3001
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
      - /app/packages/shared/node_modules
    command: pnpm --filter @tienda3d/web dev
